<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Pesquisadoras ES</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f5f5f5; padding:20px; }
.container { max-width:1200px; margin:0 auto; }
.header { background:#2D6A4F; color:white; padding:20px; border-radius:8px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:24px; }
.btn { padding:10px 20px; background:#2D6A4F; color:white; border:none; border-radius:4px; cursor:pointer; font-size:14px; }
.btn:hover { background:#1d4838; }
.btn-logout { background:#dc2626; }
.btn-logout:hover { background:#b91c1c; }
.tabs { display:flex; gap:10px; margin-bottom:20px; border-bottom:1px solid #ddd; }
.tab-btn { padding:10px 20px; background:none; border:none; cursor:pointer; font-size:14px; border-bottom:3px solid transparent; color:#666; }
.tab-btn.active { color:#2D6A4F; border-bottom-color:#2D6A4F; }
.content { background:white; padding:20px; border-radius:8px; }
.page { display:none; }
.page.active { display:block; }
h2 { margin-bottom:20px; color:#2D6A4F; font-size:20px; }
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:20px; }
.stat-card { background:#f9f9f9; padding:20px; border-radius:8px; border:1px solid #ddd; }
.stat-num { font-size:32px; font-weight:bold; color:#2D6A4F; }
.stat-label { font-size:12px; color:#666; margin-top:5px; }
.filters { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.filters input, .filters select { padding:8px 12px; border:1px solid #ddd; border-radius:4px; font-size:13px; }
.table { width:100%; border-collapse:collapse; }
.table th { background:#f0f0f0; padding:12px; text-align:left; font-weight:600; font-size:13px; border-bottom:2px solid #ddd; }
.table td { padding:12px; border-bottom:1px solid #ddd; font-size:13px; }
.table tr:hover { background:#f9f9f9; }
.badge { display:inline-block; padding:4px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-pendente { background:#fef3c7; color:#92400e; }
.badge-aprovada { background:#d1fae5; color:#065f46; }
.actions { display:flex; gap:5px; }
.btn-small { padding:5px 10px; font-size:12px; }
.btn-approve { background:#059669; }
.btn-approve:hover { background:#047857; }
.btn-delete { background:#dc2626; }
.btn-delete:hover { background:#b91c1c; }
.loading { text-align:center; color:#666; padding:20px; }
.error { background:#fee2e2; color:#991b1b; padding:12px; border-radius:4px; margin-bottom:15px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📊 Painel Admin</h1>
    <button class="btn btn-logout" onclick="logout()">Sair</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('dashboard', this)">Dashboard</button>
    <button class="tab-btn" onclick="showTab('researchers', this)">Pesquisadoras</button>
    <button class="tab-btn" onclick="showTab('works', this)">Publicações</button>
  </div>

  <div class="content">
    
    <!-- DASHBOARD -->
    <div class="page active" id="dashboard">
      <h2>Dashboard</h2>
      <div class="stats" id="stats"></div>
    </div>

    <!-- PESQUISADORAS -->
    <div class="page" id="researchers">
      <h2>Pesquisadoras</h2>
      <div class="filters">
        <input type="text" id="search" placeholder="Buscar nome..." onkeyup="filterResearchers()">
        <select id="inst-filter" onchange="filterResearchers()">
          <option value="">Instituição</option>
        </select>
        <select id="area-filter" onchange="filterResearchers()">
          <option value="">Área</option>
        </select>
      </div>
      <table class="table">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Instituição</th>
            <th>Área</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="researchers-tbody">
          <tr><td colspan="5" class="loading">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- PUBLICAÇÕES -->
    <div class="page" id="works">
      <h2>Publicações</h2>
      <table class="table">
        <thead>
          <tr>
            <th>Título</th>
            <th>Pesquisadora</th>
            <th>Tipo</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="works-tbody">
          <tr><td colspan="5" class="loading">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allResearchers = [];
let allWorks = [];

document.addEventListener('DOMContentLoaded', async () => {
  console.log('🔄 Painel inicializando...');
  await load();
});

async function load() {
  try {
    const [r, w] = await Promise.all([
      db.from('researchers').select('*'),
      db.from('works').select('*')
    ]);
    
    if (r.error) throw new Error(r.error.message);
    if (w.error) throw new Error(w.error.message);
    
    allResearchers = r.data || [];
    allWorks = w.data || [];
    
    console.log('✅ Dados carregados:', allResearchers.length, 'pesquisadoras,', allWorks.length, 'publicações');
    
    renderAll();
  } catch(e) {
    console.error('❌ Erro:', e.message);
    alert('Erro ao carregar: ' + e.message);
  }
}

function renderAll() {
  renderDashboard();
  renderFilters();
  renderResearchers();
  renderWorks();
}

function renderDashboard() {
  const html = `
    <div class="stat-card">
      <div class="stat-num">${allResearchers.length}</div>
      <div class="stat-label">Total de Pesquisadoras</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${allResearchers.filter(r => r.status === 'aprovada').length}</div>
      <div class="stat-label">Aprovadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${allResearchers.filter(r => r.status === 'pendente').length}</div>
      <div class="stat-label">Pendentes</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${allWorks.length}</div>
      <div class="stat-label">Publicações</div>
    </div>
  `;
  document.getElementById('stats').innerHTML = html;
}

function renderFilters() {
  const insts = [...new Set(allResearchers.map(r => r.instituicao).filter(Boolean))];
  const areas = [...new Set(allResearchers.map(r => r.area_principal).filter(Boolean))];
  
  document.getElementById('inst-filter').innerHTML = '<option value="">Instituição</option>' + 
    insts.map(i => `<option value="${i}">${i}</option>`).join('');
  
  document.getElementById('area-filter').innerHTML = '<option value="">Área</option>' + 
    areas.map(a => `<option value="${a}">${a}</option>`).join('');
}

function filterResearchers() {
  const search = document.getElementById('search').value.toLowerCase();
  const inst = document.getElementById('inst-filter').value;
  const area = document.getElementById('area-filter').value;
  
  let filtered = allResearchers.filter(r => {
    return (!search || r.nome.toLowerCase().includes(search)) &&
           (!inst || r.instituicao === inst) &&
           (!area || r.area_principal === area);
  });
  
  renderTableResearchers(filtered);
}

function renderResearchers() {
  renderTableResearchers(allResearchers);
}

function renderTableResearchers(data) {
  const html = data.length ? data.map(r => `
    <tr>
      <td><strong>${r.nome}</strong></td>
      <td>${r.instituicao || '—'}</td>
      <td>${r.area_principal || '—'}</td>
      <td><span class="badge badge-${r.status === 'aprovada' ? 'aprovada' : 'pendente'}">${r.status || 'pendente'}</span></td>
      <td>
        <div class="actions">
          ${r.status !== 'aprovada' ? `<button class="btn btn-small btn-approve" onclick="approve('r','${r.id}')">Aprovar</button>` : ''}
          <button class="btn btn-small btn-delete" onclick="del('r','${r.id}')">Deletar</button>
        </div>
      </td>
    </tr>
  `).join('') : '<tr><td colspan="5" class="loading">Nenhuma pesquisadora</td></tr>';
  
  document.getElementById('researchers-tbody').innerHTML = html;
}

function renderWorks() {
  const html = allWorks.length ? allWorks.map(w => {
    const r = allResearchers.find(x => x.id === w.researcher_id);
    return `
    <tr>
      <td><strong>${w.titulo}</strong></td>
      <td>${r?.nome || '—'}</td>
      <td>${w.tipo}</td>
      <td><span class="badge badge-${w.status === 'aprovada' ? 'aprovada' : 'pendente'}">${w.status || 'pendente'}</span></td>
      <td>
        <div class="actions">
          ${w.status !== 'aprovada' ? `<button class="btn btn-small btn-approve" onclick="approve('w','${w.id}')">Aprovar</button>` : ''}
          <button class="btn btn-small btn-delete" onclick="del('w','${w.id}')">Deletar</button>
        </div>
      </td>
    </tr>
  `}).join('') : '<tr><td colspan="5" class="loading">Nenhuma publicação</td></tr>';
  
  document.getElementById('works-tbody').innerHTML = html;
}

async function approve(type, id) {
  const table = type === 'r' ? 'researchers' : 'works';
  try {
    const { error } = await db.from(table).update({status: 'aprovada'}).eq('id', id);
    if(error) throw error;
    alert('✓ Aprovado!');
    await load();
  } catch(e) {
    alert('Erro: ' + e.message);
  }
}

async function del(type, id) {
  if(!confirm('Deletar?')) return;
  try {
    if(type === 'r') {
      await db.from('works').delete().eq('researcher_id', id);
      await db.from('researchers').delete().eq('id', id);
    } else {
      await db.from('works').delete().eq('id', id);
    }
    alert('✓ Deletado!');
    await load();
  } catch(e) {
    alert('Erro: ' + e.message);
  }
}

function showTab(tab, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function logout() {
  if(confirm('Sair?')) window.location.href = 'login.html';
}
</script>

</body>
</html>
